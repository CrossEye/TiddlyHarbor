<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Favicon: simplified for 16-32px rendering -->

  <rect width="32" height="32" rx="6" fill="#0f2b44"/>

  <!-- Three containers -->
  <rect x="3" y="10" width="8" height="11" rx="1" fill="#1a5276"/>
  <rect x="13" y="8" width="8" height="13" rx="1" fill="#2e86ab"/>
  <rect x="23" y="11" width="7" height="10" rx="1" fill="#1a3a5c"/>

  <!-- TW labels (simplified to single strokes at this size) -->
  <text x="7" y="17" font-family="Arial, sans-serif" font-size="5" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.8">TW</text>
  <text x="17" y="16" font-family="Arial, sans-serif" font-size="5.5" font-weight="700" fill="#e8e8e8" text-anchor="middle" opacity="0.8">TW</text>
  <text x="26.5" y="18" font-family="Arial, sans-serif" font-size="5" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.8">TW</text>

  <!-- Dock -->
  <line x1="2" y1="22" x2="30" y2="22" stroke="#5d6d7e" stroke-width="2" stroke-linecap="round"/>

  <!-- Water -->
