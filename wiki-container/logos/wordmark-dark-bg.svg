<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Wordmark on full dark background strip (for headers, banners) -->

  <rect width="480" height="120" rx="8" fill="#0a1628"/>

  <!-- Icon in rounded square -->
  <g transform="translate(14, 9)">
    <rect width="102" height="102" rx="18" fill="#0f2b44"/>

    <!-- Three containers -->
    <rect x="14" y="36" width="22" height="28" rx="2" fill="#1a5276"/>
    <rect x="40" y="29" width="22" height="35" rx="2" fill="#2e86ab"/>
    <rect x="66" y="39" width="20" height="25" rx="2" fill="#1a3a5c"/>

    <!-- TW labels -->
    <text x="25" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="7.5" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.8">TW</text>
    <text x="51" y="47" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="700" fill="#e8e8e8" text-anchor="middle" opacity="0.8">TW</text>
    <text x="76" y="52" font-family="'Segoe UI', Arial, sans-serif" font-size="7" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.8">TW</text>

    <!-- Tiddler cards -->
    <rect x="20" y="53" width="7" height="8" rx="1" fill="none" stroke="#5dade2" stroke-width="0.8" opacity="0.5"/>
    <line x1="22" y1="56" x2="26" y2="56" stroke="#5dade2" stroke-width="0.6" opacity="0.4"/>

    <rect x="46" y="50" width="7.5" height="9" rx="1" fill="none" stroke="#e8e8e8" stroke-width="0.8" opacity="0.5"/>
    <line x1="48" y1="53.5" x2="52" y2="53.5" stroke="#e8e8e8" stroke-width="0.6" opacity="0.4"/>

    <rect x="71" y="55" width="7" height="8" rx="1" fill="none" stroke="#5dade2" stroke-width="0.8" opacity="0.5"/>
    <line x1="73" y1="58" x2="77" y2="58" stroke="#5dade2" stroke-width="0.6" opacity="0.4"/>

    <!-- Connection lines -->
    <line x1="31" y1="49" x2="43" y2="46" stroke="#f4c542" stroke-width="1" opacity="0.4"/>
    <line x1="59" y1="46" x2="69" y2="51" stroke="#f4c542" stroke-width="1" opacity="0.4"/>

    <!-- Dock -->
    <line x1="8" y1="66" x2="94" y2="66" stroke="#5d6d7e" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Water -->
    <path d="M8,74 Q30,70 51,74 Q72,78 94,74" fill="none" stroke="#2e86ab" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M8,81 Q33,77 55,81 Q78,85 94,81" fill="none" stroke="#2e86ab" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
  </g>

  <!-- Text -->
  <text x="132" y="66" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="600" fill="#e8e8e8">
    <tspan fill="#5dade2">Tiddly</tspan><tspan fill="#e8e8e8">Harbor</tspan>
  </text>

  <!-- Tagline -->
  <text x="134" y="89" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5d6d7e" letter-spacing="2">
    MULTI-WIKI HOSTING PLATFORM
  </text>
</svg>
