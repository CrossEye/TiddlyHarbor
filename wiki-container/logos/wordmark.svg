<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!-- Wordmark: icon + TiddlyHarbor text -->

  <!-- Icon in circle -->
  <g transform="translate(10, 5)">
    <circle cx="55" cy="55" r="52" fill="#0f2b44"/>

    <!-- Three containers -->
    <rect x="20" y="42" width="22" height="28" rx="2" fill="#1a5276"/>
    <rect x="47" y="35" width="22" height="35" rx="2" fill="#2e86ab"/>
    <rect x="74" y="45" width="20" height="25" rx="2" fill="#1a3a5c"/>

    <!-- TW labels -->
    <text x="31" y="56" font-family="'Segoe UI', Arial, sans-serif" font-size="7.5" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.8">TW</text>
    <text x="58" y="53" font-family="'Segoe UI', Arial, sans-serif" font-size="8.5" font-weight="700" fill="#e8e8e8" text-anchor="middle" opacity="0.8">TW</text>
    <text x="84" y="58" font-family="'Segoe UI', Arial, sans-serif" font-size="7" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.8">TW</text>

    <!-- Tiddler cards -->
    <rect x="26" y="59" width="7" height="8" rx="1" fill="none" stroke="#5dade2" stroke-width="0.8" opacity="0.5"/>
    <line x1="28" y1="62" x2="32" y2="62" stroke="#5dade2" stroke-width="0.6" opacity="0.4"/>

    <rect x="53" y="56" width="7.5" height="9" rx="1" fill="none" stroke="#e8e8e8" stroke-width="0.8" opacity="0.5"/>
    <line x1="55" y1="59.5" x2="59" y2="59.5" stroke="#e8e8e8" stroke-width="0.6" opacity="0.4"/>

    <rect x="79" y="61" width="7" height="8" rx="1" fill="none" stroke="#5dade2" stroke-width="0.8" opacity="0.5"/>
    <line x1="81" y1="64" x2="85" y2="64" stroke="#5dade2" stroke-width="0.6" opacity="0.4"/>

    <!-- Connection lines -->
    <line x1="37" y1="55" x2="50" y2="52" stroke="#f4c542" stroke-width="1" opacity="0.4"/>
    <line x1="66" y1="52" x2="77" y2="57" stroke="#f4c542" stroke-width="1" opacity="0.4"/>

    <!-- Dock -->
    <line x1="14" y1="72" x2="96" y2="72" stroke="#5d6d7e" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Water -->
    <path d="M14,80 Q34,76 55,80 Q76,84 96,80" fill="none" stroke="#2e86ab" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <path d="M14,87 Q37,83 60,87 Q83,91 96,87" fill="none" stroke="#2e86ab" stroke-width="1" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- Text -->
  <text x="130" y="68" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="600" fill="#e8e8e8">
    <tspan fill="#5dade2">Tiddly</tspan><tspan fill="#4a6a82">Harbor</tspan>
  </text>

  <!-- Tagline -->
  <text x="132" y="91" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#5d6d7e" letter-spacing="2">
    MULTI-WIKI HOSTING PLATFORM
  </text>
</svg>
