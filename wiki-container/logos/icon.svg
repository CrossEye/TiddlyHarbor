<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Variant: original proportions but containers have a "TW" label
       and a small tiddler-card icon, making it immediately clear these
       are TiddlyWiki instances -->

  <!-- Three containers -->
  <rect x="30" y="80" width="38" height="45" rx="3" fill="#1a5276"/>
  <rect x="78" y="70" width="38" height="55" rx="3" fill="#2e86ab"/>
  <rect x="126" y="85" width="38" height="40" rx="3" fill="#1a3a5c"/>

  <!-- "TW" labels on containers -->
  <text x="49" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.7">TW</text>
  <text x="97" y="95" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle" opacity="0.7">TW</text>
  <text x="145" y="103" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="#5dade2" text-anchor="middle" opacity="0.7">TW</text>

  <!-- Small tiddler card icons below labels -->
  <!-- Card on container 1 -->
  <rect x="42" y="104" width="10" height="12" rx="1.5" fill="none" stroke="#5dade2" stroke-width="1.2" opacity="0.5"/>
  <line x1="44" y1="108" x2="50" y2="108" stroke="#5dade2" stroke-width="0.8" opacity="0.4"/>
  <line x1="44" y1="111" x2="49" y2="111" stroke="#5dade2" stroke-width="0.8" opacity="0.3"/>

  <!-- Card on container 2 -->
  <rect x="90" y="100" width="11" height="14" rx="1.5" fill="none" stroke="#e8e8e8" stroke-width="1.2" opacity="0.5"/>
  <line x1="92" y1="105" x2="99" y2="105" stroke="#e8e8e8" stroke-width="0.8" opacity="0.4"/>
  <line x1="92" y1="108" x2="98" y2="108" stroke="#e8e8e8" stroke-width="0.8" opacity="0.3"/>

  <!-- Card on container 3 -->
  <rect x="139" y="107" width="10" height="12" rx="1.5" fill="none" stroke="#5dade2" stroke-width="1.2" opacity="0.5"/>
  <line x1="141" y1="111" x2="147" y2="111" stroke="#5dade2" stroke-width="0.8" opacity="0.4"/>
  <line x1="141" y1="114" x2="146" y2="114" stroke="#5dade2" stroke-width="0.8" opacity="0.3"/>

  <!-- Connection lines -->
  <line x1="58" y1="99" x2="84" y2="94" stroke="#f4c542" stroke-width="1.5" opacity="0.4"/>
  <line x1="110" y1="94" x2="136" y2="102" stroke="#f4c542" stroke-width="1.5" opacity="0.4"/>

  <!-- Dock line -->
  <line x1="20" y1="125" x2="180" y2="125" stroke="#5d6d7e" stroke-width="4" stroke-linecap="round"/>

  <!-- Water -->
  <path d="M15,140 Q40,133 65,140 Q90,147 115,140 Q140,133 165,140 Q180,147 190,140" fill="none" stroke="#2e86ab" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M10,152 Q40,145 70,152 Q100,159 130,152 Q160,145 185,152" fill="none" stroke="#2e86ab" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
</svg>
